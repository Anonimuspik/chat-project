<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>

  <style>
    body {
      background-color: #0f0f0f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    input {
      background-color: #1e1e1e;
      color: #fff;
      border: 1px solid #333;
      padding: 8px;
      margin: 5px 0;
      width: 200px;
    }

    button {
      background-color: #333;
      color: #fff;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      padding: 6px;
      background-color: #1a1a1a;
      margin-bottom: 5px;
      border-radius: 5px;
    }

    .chat-box {
      max-width: 400px;
    }
  </style>
</head>

<body>

  <div class="chat-box">
    <h2>Чат</h2>

    <input id="name" placeholder="Имя"><br>
    <input id="msg" placeholder="Сообщение">
    <br>
    <button onclick="send()">Отправить</button>

    <ul id="chat"></ul>
  </div>

  <script>
    function send() {
      const name = document.getElementById("name").value.trim();
      const msg = document.getElementById("msg").value.trim();

      if (!name || !msg) return;

      const li = document.createElement("li");
      li.textContent = name + ": " + msg;

      document.getElementById("chat").appendChild(li);
      document.getElementById("msg").value = "";
    }
  </script>

</body>
</html>
